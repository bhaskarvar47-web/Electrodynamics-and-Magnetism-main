<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Field line simulator</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: #17171b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 6px;
        }

        p {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 15px;
            color: #a0a0a0;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #616b7c;
        }

        #addPos { border-bottom: 3px solid #ff4150;}
        #addNeg { border-bottom: 3px solid #303bfa;}
        #addTest { border-bottom: 3px solid #ffda6a;
                   color: #ffda6a; 
        }

        #canvas-container {
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <h1>Electric Field Simulator</h1>
    <p>Drag the charges. Red(+), Blue(-), Yellow(Test Charge). Continuous field lines tracee the forces</p>

    <div class="controls">
        <button id="addPos">Add Positive (+)</button>
        <button id="addNeg">Add Negative (-)</button>
        <button id="addTest">Add Test Charge</button>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas" width="800" height="600"></canvas>
    </div>

</body>
</html>
