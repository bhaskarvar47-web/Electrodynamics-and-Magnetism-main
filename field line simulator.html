<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electric Field line simulator</title>
    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: #17171b;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 6px;
        }

        p {
            margin-top: 0;
            margin-bottom: 16px;
            font-size: 15px;
            color: #a0a0a0;
        }

        .controls {
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        button {
            background-color: #616b7c;
        }

        #addPos { border-bottom: 3px solid #ff4150;}
        #addNeg { border-bottom: 3px solid #303bfa;}
        #addTest { border-bottom: 3px solid #ffda6a;
                   color: #ffda6a; 
        }

        #canvas-container {
            position: relative;
            background-color: #ffffff;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            cursor: grab;
        }

        canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>
    <h1>Electric Field Simulator</h1>
    <p>Drag the charges. Red(+), Blue(-), Yellow(Test Charge). Continuous field lines tracee the forces</p>

    <div class="controls">
        <button id="addPos">Add Positive (+)</button>
        <button id="addNeg">Add Negative (-)</button>
        <button id="addTest">Add Test Charge</button>
    </div>

    <div id="canvas-container">
        <canvas id="simCanvas" width="800" height="600"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx =  canvas.getContext('2d');
        const K = 100000;
        const GRID_SIZE = 20;
        const CHARGE_RADIUS = 15;
        const TEST_CHARGE_RADIUS = 8;

        let charges = [
            {x: 300, y: 300, q: 1, color: '#ff4757' },
            {x: 500, y: 300, q: -1, color: '#3742fa'}
        ];

    function drawArrow (x, y, angle, magnitude, color, lineThickness) {
        let length = Math.min(magnitude, GRID_SIZE*1.5);
        if (length<2) return;

        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(length, 0);
        ctx.lineTo(length -5, -4);
        ctx.moveTo(length, 0);
        ctx.lineTo(length -5, 4);

        ctx.strokeStyle = color;
        ctx.lineWidth = lineThickness;
        ctx.stroke();
        ctx.restore();
    }
    
    function drawBackgroundGrid() {
        ctx.strokeStyle = '#f0f0f0';
        ctx.lineWidth = 1;
        for(let x=0; x<=canvas.width; x+=GRID_SIZE) {
            ctx.beginPath(); 
            ctx.moveTo(x,0);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }

        for(let y= 0; y<= canvas.height; y+=GRID_SIZE) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    } 

    function drawVectorFieldGrid() {
        if(charges.length === 0) return;

        for(let x = GRID_SIZE/2; x<canvas.width; x+=GRID_SIZE) {
            for(let y = GRID_SIZE/2; y<canvas.height; y+=GRID_SIZE) {
                let field = calculateField(x, y);
                let magnitude = Math.sqrt(field.Ex * field.Ex + field.Ey*field.Ey);
                let angle = Math.atan2(field.Ey, field.Ex);

                drawArrow(x, y, angle, magnitude, 'rgba(100, 100, 100, 0.15)', 1.5);
            }    
        }
    }


    function drawContinuousFieldLines() {
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(46, 204, 113, 0.6)';

        for(let charge of charges) {
            if (charge.q<=0) continue;

            const numLines = 15;
            for(let i=0; i<numLines; i++) {
                let angle = (i/numLines)*Math.PI*2;

                let x = charge.x + Math.cos(angle)*(CHARGE_RADIUS+2);
                let y = charge.y + Math.sin(angle)*(CHARGE_RADIUS+2);

                ctx.beginPath();
                ctx.moveTo(x, y);

                let steps = 0;
                const maxSteps = 800;
                const ds = 3;

                while (steps<maxSteps) {
                    let field = calculateField(x, y);
                    let mag = Math.sqrt(field.Ex*field.Ex + field.Ey* field.Ey);

                    if (mag===0) break;
                    x+= (field.Ex/mag)*ds;
                    y+= (field.Ey/mag)*ds;

                    ctx.lineTo(x, y);

                    if (x<0 || x>canvas.width || y<0 || y>canvas.height) break;
                    
                    let hitNegative = false;
                    for (let other of charges) {
                        if (other.q<0) {
                            let dx= x-other.x;
                            let dy=y-other.y;
                            if (dx*dx + dy*dy < CHARGE_RADIUS*CHARGE_RADIUS){
                                hitNegative = true;
                                break;
                            }
                        }
                    }
                    if (hitNegative) break;

                    steps++;
                }
                ctx.stroke();
            }
        }
    }


    function drawTestCharges() {
        for (let charge of charges) {
           ctx.beginPath();
           ctx.arc(charge.x,  charge.y, CHARGE_RADIUS, 0, Math.PI*2);
           ctx.fillStyle = charge.color;
           ctx.fill();
           ctx.lineWidth = 2;
           ctx.strokeStyle = '#2f3542';
           ctx.stroke();
           ctx.fillStyle = 'white';
           ctx.font = '20px Arial';
           ctx.textAlign = 'centre';
           ctx.textBaseline = 'middle';
           ctx.filltext(charge.q > 0 ? '+' : '-', charge.x, charge.y +1);
        }
    }
